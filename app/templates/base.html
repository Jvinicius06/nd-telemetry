<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="30">
  <title>{% block title %}ND Telemetry{% endblock %}</title>
  <style>
    :root {
      --bg:#0f1419; --panel:#1a212b; --panel2:#222c38; --line:#2c3845;
      --txt:#e6edf3; --muted:#8b98a5; --accent:#4493f8;
      --ok:#3fb950; --warn:#d29922; --bad:#f85149;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--txt);
      font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }
    header { background:var(--panel); border-bottom:1px solid var(--line);
      padding:14px 22px; display:flex; align-items:center; gap:14px; }
    header h1 { font-size:16px; margin:0; font-weight:600; }
    header .sub { color:var(--muted); font-size:12px; }
    .wrap { max-width:1200px; margin:0 auto; padding:22px; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
      gap:14px; margin-bottom:22px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:10px;
      padding:16px; }
    .card .n { font-size:28px; font-weight:700; }
    .card .l { color:var(--muted); font-size:12px; text-transform:uppercase;
      letter-spacing:.4px; }
    .card.bad .n { color:var(--bad); } .card.warn .n { color:var(--warn); }
    h2 { font-size:14px; color:var(--muted); text-transform:uppercase;
      letter-spacing:.5px; margin:24px 0 10px; }
    table { width:100%; border-collapse:collapse; background:var(--panel);
      border:1px solid var(--line); border-radius:10px; overflow:hidden; }
    th,td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line);
      font-size:13px; vertical-align:top; }
    th { color:var(--muted); font-weight:600; background:var(--panel2);
      text-transform:uppercase; font-size:11px; letter-spacing:.4px; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--panel2); }
    .dot { display:inline-block; width:9px; height:9px; border-radius:50%;
      margin-right:6px; vertical-align:middle; }
    .dot.ok { background:var(--ok); } .dot.bad { background:var(--bad); }
    .pill { display:inline-block; padding:1px 8px; border-radius:20px; font-size:12px;
      border:1px solid var(--line); }
    .pill.bad { color:var(--bad); border-color:var(--bad); }
    .pill.warn { color:var(--warn); border-color:var(--warn); }
    .pill.ok { color:var(--ok); border-color:var(--ok); }
    .bar { background:var(--panel2); border-radius:5px; height:18px; position:relative;
      min-width:60px; }
    .bar > span { position:absolute; left:0; top:0; bottom:0; border-radius:5px;
      background:var(--accent); }
    .muted { color:var(--muted); }
    code { background:var(--panel2); padding:1px 5px; border-radius:4px;
      font-family:ui-monospace,Consolas,monospace; font-size:12px; }
    .empty { color:var(--muted); padding:30px; text-align:center; }
  </style>
</head>
<body>
  <header>
    <h1>📡 ND Telemetry</h1>
    <span class="sub">monitor de reboots &amp; eventos</span>
    <span class="sub" style="margin-left:auto">⟳ 30s · {{ now|dt }}</span>
  </header>
  <div class="wrap">
    {% block body %}{% endblock %}
  </div>
</body>
</html>
